[package]
name = "claude-agent-sdk-rs"
version = "0.6.0"
authors = ["Tyr Chen <tyr.chen@gmail.com>"]
edition = "2024"
rust-version = "1.85"
license = "MIT"
documentation = "https://docs.rs/claude-agent-sdk-rs"
repository = "https://github.com/tyrchen/claude-agent-sdk-rs"
homepage = "https://github.com/tyrchen/claude-agent-sdk-rs"
description = "Rust SDK for Claude Code CLI with bidirectional streaming, hooks, custom tools, plugin support, and Agent Skills - 100% feature parity with Python SDK"
readme = "README.md"
categories = ["development-tools", "api-bindings", "asynchronous"]
keywords = ["claude", "ai", "agent", "anthropic", "llm"]
include = ["src/**/*.rs", "Cargo.toml", "LICENSE", "README.md"]

[dependencies]
# Async runtime
tokio = { version = "1.48", features = [
  "macros",
  "rt-multi-thread",
  "process",
  "io-util",
  "sync",
  "time",
] }

# Async traits
async-trait = "0.1"
futures = "0.3"
pin-project = "1.1"
async-stream = "0.3"

# Serialization
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
serde_norway = { version = "0.9", optional = true }

# Semantic versioning
semver = { version = "1.0", features = ["serde"] }

# Error handling
thiserror = "2.0"
anyhow = "1.0"

# Path utilities
path-absolutize = "3.1"

# Logging
tracing = "0.1"

# UUID generation
uuid = { version = "1.19", features = ["v4"] }
typed-builder = "0.23.2"

# Macro utilities
paste = "1.0"

# File system monitoring (optional, for hot reload)
notify = { version = "7.0", optional = true }
notify-debouncer-mini = { version = "0.5", optional = true }

# WebAssembly sandboxing (optional, for secure skill execution)
wasm-sandbox = { version = "0.1", optional = true }

[dev-dependencies]
tokio-test = "0.4"
mockall = "0.14"
tracing-subscriber = "0.3"

[features]
default = []
yaml = ["serde_norway"]
hot-reload = ["notify", "notify-debouncer-mini"]
sandbox = ["wasm-sandbox"]
